      <stop offset="0%" stop-color="#F5E0A8"/>
      <stop offset="55%" stop-color="#C4A35A"/>
      <stop offset="100%" stop-color="#8A7340"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="0" y2="1">
