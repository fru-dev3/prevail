name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

# Opt into Node.js 24 on the runner so the warning from actions/checkout@v4
# + softprops/action-gh-release@v2 (which currently default to Node.js 20)
# goes away. GitHub deprecates Node 20 on 2026-09-16; this just sets us up
# ahead of the cutover. Lift the var when the actions ship a v5/v3 that
# defaults to Node 24 natively.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Stage 1: build + package each platform on its native runner, then hand the
  # tarball up as a workflow artifact. Crucially, NO job touches the GitHub
  # release here — when all four matrix legs raced to create/upload the same
  # release (action-gh-release), uploads collided and assets were silently
  # dropped (v1.6.5 shipped only 2 of 4 platforms). Splitting publish into a
  # single downstream job removes the race entirely.
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
            bun-target: bun-darwin-arm64
          - target: darwin-x64
            os: macos-13
            bun-target: bun-darwin-x64
          - target: linux-x64
            os: ubuntu-latest
            bun-target: bun-linux-x64
          - target: linux-arm64
            os: ubuntu-24.04-arm
            bun-target: bun-linux-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: install
        run: bun install

      - name: typecheck
        run: bun node_modules/typescript/bin/tsc --noEmit

      - name: build single binary
        run: |
          mkdir -p dist
          bun build --compile \
            --target=${{ matrix.bun-target }} \
            --outfile=dist/prevail \
            src/index.tsx
          # bundle the vault-demo and operating manual alongside the binary
          cp -R vault-demo dist/vault-demo
          cp AGENTS-operating.md dist/AGENTS-operating.md
          chmod +x dist/prevail

      - name: package
        working-directory: dist
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          tar -czf "prevail-${VERSION}-${{ matrix.target }}.tar.gz" prevail vault-demo AGENTS-operating.md
          ls -la

      - name: upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: prevail-${{ matrix.target }}
          path: dist/prevail-*.tar.gz
          if-no-files-found: error

  # Stage 2: one job, after ALL builds succeed, downloads every platform tarball
  # and publishes a single release with all four assets in one call. `needs:
  # build` means a build failure on any platform blocks the release outright
  # (better a loud no-release you rerun than a silent partial one).
  publish:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list artifacts
        run: ls -la artifacts

      - name: publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/prevail-*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
