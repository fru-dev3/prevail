name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Same Node.js 24 opt-in as release.yml — silences the deprecation
  # warning ahead of the 2026-09-16 cutover.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: lint (biome)
        run: bun run lint
      - name: typecheck
        run: bun run typecheck
      - name: unit tests + --help smoke
        run: bun run test
      - name: build (verify single-binary compiles)
        run: bun build --compile ./src/index.tsx --outfile prevail
