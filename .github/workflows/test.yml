name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: typecheck
        run: bun run typecheck
      - name: unit tests + --help smoke
        run: bun run test
      - name: build (verify single-binary compiles)
        run: bun build --compile ./src/index.tsx --outfile prevail
